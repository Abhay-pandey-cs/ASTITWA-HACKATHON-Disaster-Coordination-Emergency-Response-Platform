<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Coordination & Emergency Response</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loader" class="loader-overlay active">
        <div class="spinner"></div>
    </div>

    <!-- Main App Container -->
    <div class="app-container">
        <!-- Sidebar Dashboard -->
        <aside class="sidebar glass-panel">
            <div class="brand">
                <h1>Crisis<span>Sync</span></h1>
                <p>Emergency Response Platform</p>
            </div>
            
            <div id="auth-section" class="auth-section">
                <!-- Login / Register Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn" onclick="switchTab('register')">Register</button>
                </div>
                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
                <!-- Register Form -->
                <form id="register-form" class="auth-form hidden">
                    <input type="text" id="reg-name" placeholder="Full Name" required>
                    <input type="email" id="reg-email" placeholder="Email" required>
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <select id="reg-role">
                        <option value="citizen">Citizen</option>
                        <option value="volunteer">Volunteer</option>
                        <option value="authority">Authority</option>
                    </select>
                    <button type="submit" class="btn-primary">Sign Up</button>
                </form>
            </div><!-- auth-section -->

            <!-- User Status & Stats (Hidden until login) -->
            <div id="dashboard-section" class="dashboard-section hidden">
                <div class="user-block">
                    <p>Welcome, <span id="user-name-display" class="highlight">User</span></p>
                    <span id="user-role-badge" class="badge">Role</span>
                    <button id="logout-btn" class="btn-outline">Logout</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <h3 id="stat-total">0</h3>
                        <span>Total Reports</span>
                    </div>
                    <div class="stat-card warning">
                        <h3 id="stat-active">0</h3>
                        <span>Active Incidents</span>
                    </div>
                </div>

                <div class="actions">
                    <button id="btn-report" class="btn-danger ripple">Report Emergency</button>
                </div>

                <!-- Feed of Reports -->
                <div class="live-feed">
                    <h4>Live Incident Feed</h4>
                    <div id="feed-container" class="feed-container">
                        <!-- Feed Items Injected Here -->
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Report Modal -->
    <div id="report-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel drop-anim">
            <h2>Report an Emergency</h2>
            <form id="report-form">
                <div class="form-group">
                    <label>Title / Brief Info</label>
                    <input type="text" id="req-title" required placeholder="E.g. Building collapse">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="req-desc" required placeholder="Provide details..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Disaster Type</label>
                        <select id="req-type" required>
                            <option value="earthquake">Earthquake</option>
                            <option value="flood">Flood</option>
                            <option value="fire">Fire</option>
                            <option value="medical">Medical</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Severity</label>
                        <select id="req-severity" required>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="critical">Critical</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Location (Auto-detected)</label>
                    <input type="text" id="req-loc" readonly placeholder="Fetching GPS...">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-outline" onclick="closeReportModal()">Cancel</button>
                    <button type="submit" class="btn-danger" id="submit-report-btn">Submit Report</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
